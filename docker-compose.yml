services:
  db:
    image: pgvector/pgvector:pg16
    container_name: usalama_db
    environment:
      POSTGRES_USER: usalama
      POSTGRES_PASSWORD: usalama_secret
      POSTGRES_DB: usalama_db
    ports:
      - "5432:5432"
    volumes:
      - usalama_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usalama -d usalama_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  usalama_pgdata:
